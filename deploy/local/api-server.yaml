apiVersion: v1
kind: ServiceAccount
metadata:
  name: teepin-api
  namespace: teepin-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: teepin-api
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "endpoints"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: teepin-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: teepin-api
subjects:
- kind: ServiceAccount
  name: teepin-api
  namespace: teepin-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teepin-api
  namespace: teepin-system
  labels:
    app: teepin-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teepin-api
  template:
    metadata:
      labels:
        app: teepin-api
    spec:
      serviceAccountName: teepin-api
      containers:
      - name: api
        image: teepin/api:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: GIN_MODE
          value: "release"
        - name: DB_HOST
          value: "postgres.teepin.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "teepin"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: DB_NAME
          value: "teepin_db"
        - name: DB_SSLMODE
          value: "disable"
        - name: JWT_SECRET
          value: "change_me_in_production_super_secret_jwt_key_12345"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: teepin-api
  namespace: teepin-system
  labels:
    app: teepin-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: teepin-api
